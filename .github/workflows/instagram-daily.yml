name: Instagram Daily Post

on:
  schedule:
    # 06:00 BRT = 09:00 UTC  (BRT = UTC-3)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'ID do tópico (sepse|ventilacao|choque|iam|ira|acido-base|neurointensivismo). Vazio = rotação automática.'
        required: false
        default: ''

jobs:
  post:
    name: Gerar card e publicar no Instagram
    runs-on: ubuntu-latest
    permissions:
      contents: write   # para commitar a imagem gerada

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main        # sempre trabalha na branch main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Pillow
        run: pip install Pillow --quiet

      - name: Gerar card do dia
        id: card
        run: |
          TOPIC="${{ github.event.inputs.topic_id }}"
          python3 scripts/instagram/make_card.py \
            "${TOPIC:-auto}" \
            assets/instagram/card-today.png 2>&1
          echo "card_path=assets/instagram/card-today.png" >> $GITHUB_OUTPUT

      - name: Commitar e publicar imagem (para URL pública)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/instagram/card-today.png
          git diff --cached --quiet || git commit -m "chore: atualizar card Instagram do dia [skip ci]"
          git push

      - name: Aguardar CDN do GitHub (10s)
        run: sleep 10

      - name: Publicar no Instagram
        run: python3 scripts/instagram/post_api.py
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_HANDLE:       ${{ secrets.IG_HANDLE }}
          GITHUB_REPO:     ${{ github.repository }}
          TOPIC_ID:        ${{ github.event.inputs.topic_id }}
